name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.9,<1"
      - run: ruff check server
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "18.18.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  backend:
    name: Backend tests (sqlite + pgvector)
    runs-on: ubuntu-latest
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r server/requirements-dev.txt -r server/requirements-pgvector.txt
      - run: python -m pytest server/tests -q
        env:
          MYOPENWEB_TEST_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres

  frontend:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "18.18.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
