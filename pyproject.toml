[tool.ruff]
target-version = "py312"
line-length = 110
include = ["server/**/*.py"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: import order, B: bugbear, UP: pyupgrade,
# SIM: simplify. Kept intentionally lean; formatting is ruff format's job.
select = ["E", "W", "F", "I", "B", "UP", "SIM"]
ignore = [
    # Line length is enforced loosely; prompts and Chinese doc-strings read
    # better unwrapped.
    "E501",
]

[tool.ruff.lint.per-file-ignores]
# conftest must mutate os.environ before importing server modules.
"server/tests/conftest.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["server/tests"]
